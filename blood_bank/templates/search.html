<!DOCTYPE html>
<html>
<head>
    <title>Search Blood</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Search Blood</h1>

    <div class="card">
        <form method="POST">
            <input name="blood_group" placeholder="Blood Group" required>
            <button type="submit">Search</button>
        </form>
    </div>

    {% if data %}
        {% for item in data %}
        <div class="result-box">
            <p><b>Group:</b> {{ item.blood_group }}</p>
            <p><b>Units:</b> {{ item.units }}</p>
            <p><b>Location:</b> {{ item.location }}</p>
        </div>
        {% endfor %}
    {% endif %}

    <a href="/" class="back">← Back</a>
</div>

</body>
</html>
