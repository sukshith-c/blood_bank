<!DOCTYPE html>
<html>
<head>
    <title>Smart Blood Bank</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>🩸 Smart Blood Bank System</h1>

    <img src="https://hellohyderabad.org/wp-content/uploads/2025/04/BLOOD-BANKS.jpg" class="banner">

    <div class="card">
        <h2>Add Blood</h2>
        <form action="/add" method="POST">
            <input name="blood_group" placeholder="Blood Group (A+, O-...)" required>
            <input name="units" placeholder="Units" required>
            <input name="location" placeholder="Location" required>
            <button type="submit">➕ Add Blood</button>
        </form>
    </div>

    <div class="card">
        <h2>Search Blood</h2>
        <form action="/search" method="POST">
            <input name="blood_group" placeholder="Enter Blood Group" required>
            <button type="submit">🔍 Search</button>
        </form>
    </div>

</div>

</body>
</html>
